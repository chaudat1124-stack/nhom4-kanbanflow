workflows:
  ios_sideloadly:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.nhom4.taskmate"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
      - name: Set iOS bundle identifier
        script: |
          sed -i '' "s/com.nhom4.taskmate/${BUNDLE_ID}/g" ios/Runner.xcodeproj/project.pbxproj
      - name: Prepare Flutter iOS configs
        script: |
          flutter build ios --release --config-only
      - name: Build unsigned Runner.app
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios_unsigned \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build
      - name: Package unsigned IPA for Sideloadly
        script: |
          rm -rf Payload
          mkdir -p Payload
          cp -R build/ios_unsigned/Build/Products/Release-iphoneos/Runner.app Payload/Runner.app
          mkdir -p build/ios/ipa
          zip -r build/ios/ipa/TaskMate-unsigned.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
